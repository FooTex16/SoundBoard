<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-Sound | Remote Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 0%, #150000 0%, #050505 80%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }
        h1, .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Glassmorphism & Neon Effects */
        .glass-panel {
            background: rgba(15, 15, 15, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 0, 60, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .neon-border {
            border: 2px solid #ff003c;
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.4), inset 0 0 10px rgba(255, 0, 60, 0.1);
        }
        .sound-btn {
            border-radius: 16px;
            transition: all 0.15s ease-in-out;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            user-select: none;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .sound-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        .sound-btn:active {
            transform: scale(0.92);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #ff003c; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 glass-panel p-6 neon-border">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-pink-600 tracking-wider">
                    RE-SOUND HUB
                </h1>
                <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Web Remote Controller</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-3 bg-black/80 px-6 py-3 rounded-full border border-gray-800 shadow-inner">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_#ff0000] animate-pulse"></div>
                <span id="target-device-label" class="text-sm font-bold tracking-wide text-red-500">NO DEVICE SELECTED</span>
            </div>
        </header>

        <div class="mb-8 glass-panel p-6">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 text-gray-200">
                <svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Network Active Devices
            </h2>
            <div id="device-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <div class="text-gray-500 text-sm animate-pulse">Scanning network...</div>
            </div>
        </div>

        <div class="glass-panel p-6 neon-border min-h-[400px]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Action Deck</h2>
                <button onclick="openModal()" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-[0_0_15px_rgba(255,0,60,0.5)] flex items-center gap-2">
                    <span>+</span> ADD KEY
                </button>
            </div>

            <div id="board-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-4">
                </div>
        </div>
    </div>

    <div id="add-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden flex items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
        <div class="glass-panel neon-border p-8 w-full max-w-md transform scale-95 transition-transform duration-300" id="modal-content">
            <h3 class="text-2xl font-bold mb-6 text-center orbitron text-red-500">NEW BINDING</h3>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs text-gray-400 mb-1">Display Name (Max 12 Chars)</label>
                    <input type="text" id="btn-name" maxlength="12" placeholder="e.g., Shoot, Laugh, F1..." class="w-full bg-black/60 border border-red-500/30 rounded-xl p-3 text-white outline-none focus:border-red-500 focus:shadow-[0_0_10px_rgba(255,0,0,0.3)] transition-all">
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Target Keyboard Key</label>
                    <select id="btn-key" class="w-full bg-black/60 border border-red-500/30 rounded-xl p-3 text-white outline-none focus:border-red-500">
                        </select>
                </div>

                <div>
                    <label class="block text-xs text-gray-400 mb-1">Aura Color</label>
                    <div class="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-gray-800">
                        <input type="color" id="btn-color" value="#ff003c" class="h-10 w-16 cursor-pointer bg-transparent border-0 p-0 rounded-lg">
                        <span class="text-xs text-gray-500">Pilih warna efek tombol</span>
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 bg-transparent border border-gray-600 hover:bg-gray-800 text-white p-3 rounded-xl font-bold transition-colors">CANCEL</button>
                    <button onclick="saveButton()" class="flex-1 bg-red-600 hover:bg-red-500 text-white p-3 rounded-xl font-bold transition-all shadow-[0_0_15px_rgba(255,0,0,0.4)]">SAVE BIND</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx8zYNUJoBv-vkrvZ23OuhUIG0LWObZIU",
            authDomain: "screenshoot-dvp.firebaseapp.com",
            databaseURL: "https://screenshoot-dvp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "screenshoot-dvp",
            storageBucket: "screenshoot-dvp.firebasestorage.app",
            messagingSenderId: "381899669468",
            appId: "1:381899669468:web:e1fc2610ed7fe658735919",
            measurementId: "G-TWYRDGDDFF"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global State
        let targetDeviceId = null;
        let soundButtons = JSON.parse(localStorage.getItem('resound_buttons')) || [];

        // Setup Opsi Keybind
        const keyOptions = [
            { group: "Functions", keys: Array.from({length: 24}, (_, i) => `f${i+1}`) },
            { group: "Numpad", keys: ['numpad_0','numpad_1','numpad_2','numpad_3','numpad_4','numpad_5','numpad_6','numpad_7','numpad_8','numpad_9','numpad_add','numpad_subtract','numpad_multiply','numpad_divide','numpad_enter'] },
            { group: "Media", keys: ['media_play_pause','media_volume_up','media_volume_down','media_volume_mute'] },
            { group: "Navigation", keys: ['up','down','left','right','page_up','page_down','home','end','insert','delete'] },
            { group: "Special", keys: ['enter','space','esc','tab','backspace','shift','ctrl','alt','cmd', 'print_screen'] },
            { group: "Standard", keys: [...'abcdefghijklmnopqrstuvwxyz0123456789'] }
        ];

        const selectEl = document.getElementById('btn-key');
        keyOptions.forEach(group => {
            const optGroup = document.createElement('optgroup');
            optGroup.label = group.group;
            group.keys.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = k.toUpperCase().replace('_', ' ');
                optGroup.appendChild(opt);
            });
            selectEl.appendChild(optGroup);
        });

        // 1. SINKRONISASI REALTIME LIST DEVICE & STATUS
        const presenceRef = ref(db, 'presence');
        onValue(presenceRef, (snapshot) => {
            const listEl = document.getElementById('device-list');
            listEl.innerHTML = '';
            const devices = snapshot.val();
            let hasOnline = false;
            let targetStillOnline = false;

            if (devices) {
                for (const [id, data] of Object.entries(devices)) {
                    if (data.online) {
                        hasOnline = true;
                        const isSelected = (targetDeviceId === id);
                        if (isSelected) targetStillOnline = true;

                        listEl.innerHTML += `
                            <div class="glass-panel p-4 flex flex-col justify-between transition-all ${isSelected ? 'border-[#00ff88] shadow-[0_0_15px_rgba(0,255,136,0.2)]' : 'border-gray-800'}">
                                <div class="flex items-center gap-3 mb-3">
                                    <div class="w-2.5 h-2.5 rounded-full ${isSelected ? 'bg-[#00ff88] shadow-[0_0_8px_#00ff88]' : 'bg-gray-500'}"></div>
                                    <div>
                                        <p class="font-bold text-sm text-white">${data.name || 'Unknown PC'}</p>
                                        <p class="text-[10px] text-gray-500 font-mono">${id}</p>
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="window.selectDevice('${id}', '${data.name || id}')" class="flex-1 ${isSelected ? 'bg-[#00ff88] text-black' : 'bg-gray-800 text-white hover:bg-gray-700'} py-1.5 rounded-lg text-xs font-bold transition-all">
                                        ${isSelected ? 'ACTIVE TARGET' : 'CONNECT'}
                                    </button>
                                    <button onclick="window.kickDevice('${id}')" class="bg-red-900/50 hover:bg-red-600 text-red-500 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold border border-red-900/50 transition-all" title="Turn Off Server">
                                        OFF
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            // AUTO-DISCONNECT JIKA DEVICE TARGET MATI/DI-KICK
            if (targetDeviceId && !targetStillOnline) {
                targetDeviceId = null;
                document.getElementById('target-device-label').innerText = "DEVICE DISCONNECTED";
                document.getElementById('target-device-label').className = "text-sm font-bold tracking-wide text-red-500";
                document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_#ff0000] animate-pulse";
            }

            if (!hasOnline) {
                listEl.innerHTML = `<div class="col-span-full text-center text-gray-500 py-6 bg-black/40 rounded-xl border border-gray-800 border-dashed">No Client Engine Online.<br><span class="text-xs text-gray-600">Run the Python app on your PC.</span></div>`;
            }
        });

        // Global functions
        window.selectDevice = (id, name) => {
            targetDeviceId = id;
            document.getElementById('target-device-label').innerText = name.toUpperCase();
            document.getElementById('target-device-label').className = "text-sm font-bold tracking-wide text-[#00ff88]";
            document.getElementById('status-dot').className = "w-3 h-3 rounded-full bg-[#00ff88] shadow-[0_0_12px_#00ff88]";
            // Trigger refresh manual
            onValue(presenceRef, () => {}, { onlyOnce: true });
        };

        // FITUR KICK DARI WEB
        window.kickDevice = (id) => {
            if(confirm('Are you sure you want to disconnect this PC?')) {
                const devicePresenceRef = ref(db, `presence/${id}`);
                remove(devicePresenceRef); // Menghapus dari database, Python akan otomatis offline
            }
        };

        // 2. MENGIRIM PERINTAH TOMBOL
        window.triggerKey = (keyName) => {
            if (!targetDeviceId) {
                alert("SELECT A DEVICE FIRST!\nClick 'CONNECT' on the active device list.");
                return;
            }
            
            const btnEl = document.getElementById(`btn-${keyName}`);
            if(btnEl) {
                btnEl.style.transform = 'scale(0.85)';
                setTimeout(() => btnEl.style.transform = 'scale(1)', 100);
            }

            // Kirim command ke Python
            const commandRef = ref(db, `devices/${targetDeviceId}/command`);
            set(commandRef, {
                key: keyName,
                timestamp: Date.now(),
                _rand: Math.random() // Penting agar listener di python selalu men-trigger walaupun tombol yang sama ditekan berkali-kali
            });
        };

        // 3. UI LOGIC & LOCALSTORAGE
        window.deleteBtn = (index, event) => {
            event.stopPropagation();
            if(confirm('Delete this keybind?')) {
                soundButtons.splice(index, 1);
                saveAndRender();
            }
        };

        window.openModal = () => {
            const modal = document.getElementById('add-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('add-modal');
            const content = document.getElementById('modal-content');
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
            document.getElementById('btn-name').value = '';
        };

        window.saveButton = () => {
            const name = document.getElementById('btn-name').value || 'KEY';
            const key = document.getElementById('btn-key').value;
            const color = document.getElementById('btn-color').value;

            soundButtons.push({ name, key, color });
            saveAndRender();
            closeModal();
        };

        function saveAndRender() {
            localStorage.setItem('resound_buttons', JSON.stringify(soundButtons));
            const grid = document.getElementById('board-grid');
            grid.innerHTML = '';

            soundButtons.forEach((btn, index) => {
                const hex2rgb = (hex) => {
                    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                    return `${r}, ${g}, ${b}`;
                };
                const rgbColor = hex2rgb(btn.color);

                grid.innerHTML += `
                    <div id="btn-${btn.key}" onclick="triggerKey('${btn.key}')" 
                         class="sound-btn aspect-square bg-black/40" 
                         style="border-color: rgba(${rgbColor}, 0.5); box-shadow: 0 0 20px rgba(${rgbColor}, 0.15) inset, 0 4px 10px rgba(0,0,0,0.3);">
                        
                        <button onclick="deleteBtn(${index}, event)" class="absolute top-1.5 right-1.5 text-gray-500 hover:text-red-500 bg-black/60 rounded-full w-6 h-6 flex items-center justify-center text-[10px] backdrop-blur-md border border-gray-700 z-10 transition-colors">✕</button>
                        
                        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background: radial-gradient(circle at center, ${btn.color} 0%, transparent 70%);"></div>

                        <span class="text-sm font-bold text-white z-10 break-words px-2 tracking-wide">${btn.name.toUpperCase()}</span>
                        <span class="text-[9px] text-gray-400 bg-black/80 px-2.5 py-1 rounded-full mt-2 border border-gray-800 z-10 orbitron tracking-widest shadow-inner">
                            ${btn.key.toUpperCase().replace('_', ' ')}
                        </span>
                    </div>
                `;
            });
        }

        saveAndRender();
    </script>
</body>
</html>
