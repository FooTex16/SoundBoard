<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re-Sound | Web Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(20,20,20,0.8); border: 1px solid #ff003c; border-radius: 15px; }
        .btn-deck { aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: 0.1s; border: 2px solid rgba(255,255,255,0.1); position: relative; }
        .btn-deck:active { transform: scale(0.9); }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-6 glass p-4">
        <h1 class="text-3xl font-bold" style="font-family: 'Orbitron'; color: #ff003c;">RE-SOUND WEB</h1>
        <div class="text-sm">Status: <span id="conn-status" class="text-red-500 font-bold">DISCONNECTED</span></div>
    </header>

    <div class="glass p-4 mb-6">
        <h2 class="text-lg font-bold mb-3">Target PC Network</h2>
        <div id="pc-list" class="grid grid-cols-1 sm:grid-cols-3 gap-3"></div>
    </div>

    <div class="glass p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold">LIVE DECK</h2>
            <button onclick="openModal()" id="add-btn" class="bg-red-600 px-4 py-2 rounded-lg font-bold hidden">+ ADD BUTTON</button>
        </div>

        <div id="deck-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
            <div class="text-gray-500 col-span-full">Connect to a PC to view the deck.</div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center z-50">
        <div class="glass p-8 w-full max-w-md">
            <h3 class="text-xl font-bold mb-4">Add Deck Button</h3>
            
            <input type="text" id="m-name" placeholder="Button Name" class="w-full bg-black border border-red-500 p-2 rounded mb-3 text-white">
            
            <select id="m-type" class="w-full bg-black border border-red-500 p-2 rounded mb-3 text-white" onchange="toggleType()">
                <option value="key">Keyboard Keybind</option>
                <option value="audio">Custom Audio (Max 1MB)</option>
            </select>

            <input type="text" id="m-key" placeholder="e.g., f1, space, numpad_1" class="w-full bg-black border border-red-500 p-2 rounded mb-3 text-white">
            
            <input type="file" id="m-audio" accept="audio/mp3, audio/wav" class="w-full bg-black border border-red-500 p-2 rounded mb-3 text-white hidden">

            <div class="flex gap-2 items-center mb-4">
                <label>Color:</label>
                <input type="color" id="m-color" value="#ff003c" class="h-8 rounded">
            </div>

            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-gray-600 p-2 rounded font-bold">CANCEL</button>
                <button onclick="saveButton()" class="flex-1 bg-red-600 p-2 rounded font-bold">SAVE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, remove, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCx8zYNUJoBv-vkrvZ23OuhUIG0LWObZIU",
            databaseURL: "https://screenshoot-dvp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "screenshoot-dvp",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Identitas Browser Web Ini
        const myClientId = 'web_' + Math.random().toString(36).substr(2, 6);
        let targetPcId = null;

        // 1. Pantau PC Online
        onValue(ref(db, 'presence'), (snap) => {
            const pcs = snap.val() || {};
            const list = document.getElementById('pc-list');
            list.innerHTML = '';
            
            let targetExists = false;
            for(const [id, data] of Object.entries(pcs)) {
                if(data.online) {
                    if(id === targetPcId) targetExists = true;
                    list.innerHTML += `
                        <div class="bg-gray-800 p-3 rounded flex justify-between items-center border ${id === targetPcId ? 'border-green-500' : 'border-gray-600'}">
                            <span>${data.name}</span>
                            <button onclick="window.connectPc('${id}')" class="bg-green-600 px-2 py-1 text-xs rounded font-bold">${id === targetPcId ? 'CONNECTED' : 'CONNECT'}</button>
                        </div>
                    `;
                }
            }
            if(targetPcId && !targetExists) disconnectPc(); // Jika PC mati
        });

        // 2. Logika Koneksi
        window.connectPc = (id) => {
            if(targetPcId) remove(ref(db, `devices/${targetPcId}/clients/${myClientId}`)); // Leave old PC
            targetPcId = id;
            
            // Daftarkan diri ke PC
            const clientRef = ref(db, `devices/${id}/clients/${myClientId}`);
            set(clientRef, { name: 'Web Chrome/Safari' });
            onDisconnect(clientRef).remove(); // Auto-hapus jika tab ditutup

            document.getElementById('conn-status').innerText = 'CONNECTED TO ' + id;
            document.getElementById('conn-status').className = 'text-green-500 font-bold';
            document.getElementById('add-btn').classList.remove('hidden');

            // Pantau Deck PC
            onValue(ref(db, `devices/${id}/deck`), renderDeck);
            
            // Pantau kalau PC meng-Kick kita
            onValue(clientRef, (s) => { if(!s.exists() && targetPcId === id) disconnectPc(); });
        };

        const disconnectPc = () => {
            targetPcId = null;
            document.getElementById('conn-status').innerText = 'DISCONNECTED';
            document.getElementById('conn-status').className = 'text-red-500 font-bold';
            document.getElementById('add-btn').classList.add('hidden');
            document.getElementById('deck-grid').innerHTML = '<div class="text-gray-500 col-span-full">Connection lost.</div>';
        };

        // 3. Render Deck & Kontrol Fixed
        function renderDeck(snap) {
            const deck = snap.val() || {};
            const grid = document.getElementById('deck-grid');
            
            // FIXED BUTTONS (Bawaan)
            grid.innerHTML = `
                <div onclick="sendCommand('play_pause')" class="btn-deck bg-[#d4af37] text-black">
                    <span class="text-2xl">⏯</span><span>PLAY/PAUSE</span>
                </div>
                <div onclick="sendCommand('stop')" class="btn-deck bg-red-800 text-white">
                    <span class="text-2xl">⏹</span><span>STOP ALL</span>
                </div>
            `;

            // CUSTOM BUTTONS
            for(const [btnId, data] of Object.entries(deck)) {
                grid.innerHTML += `
                    <div onclick="sendCommand('trigger', '${btnId}')" class="btn-deck" style="background: ${data.color}40; border-color: ${data.color}">
                        <button onclick="deleteBtn('${btnId}', event)" class="absolute top-1 right-1 text-xs bg-black/50 px-2 rounded hover:bg-red-500">X</button>
                        <span class="text-2xl">${data.type === 'audio' ? '🎵' : '⌨️'}</span>
                        <span class="text-sm mt-1 uppercase text-center px-1">${data.name}</span>
                    </div>
                `;
            }
        }

        // 4. Mengirim Perintah (Command Stream)
        window.sendCommand = (action, id = null) => {
            if(!targetPcId) return;
            set(ref(db, `devices/${targetPcId}/command`), {
                action: action, id: id, _t: Date.now()
            });
        };

        window.deleteBtn = (id, event) => {
            event.stopPropagation();
            if(confirm("Hapus tombol ini?")) remove(ref(db, `devices/${targetPcId}/deck/${id}`));
        };

        // 5. UI Form & File Upload to Base64
        window.toggleType = () => {
            const t = document.getElementById('m-type').value;
            document.getElementById('m-key').classList.toggle('hidden', t !== 'key');
            document.getElementById('m-audio').classList.toggle('hidden', t !== 'audio');
        };

        window.openModal = () => document.getElementById('modal').classList.remove('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');

        window.saveButton = () => {
            const name = document.getElementById('m-name').value;
            const type = document.getElementById('m-type').value;
            const color = document.getElementById('m-color').value;
            const btnId = 'btn_' + Date.now();

            if(type === 'key') {
                const val = document.getElementById('m-key').value;
                set(ref(db, `devices/${targetPcId}/deck/${btnId}`), { name, type, value: val, color });
                closeModal();
            } else {
                const file = document.getElementById('m-audio').files[0];
                if(!file) return alert("Pilih file audio!");
                if(file.size > 1024 * 1024 * 1.5) return alert("File terlalu besar! Maksimal 1.5MB agar realtime Firebase tidak berat."); // Limit size
                
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Audio = e.target.result;
                    set(ref(db, `devices/${targetPcId}/deck/${btnId}`), { name, type, value: base64Audio, color });
                    closeModal();
                };
                reader.readAsDataURL(file);
            }
        };
    </script>
</body>
</html>
